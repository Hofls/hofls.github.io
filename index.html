<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tools Collection</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8f9fa;
            color: #222;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        
        .tools-list {
            max-width: 600px;
            margin: 0 auto;
            list-style: none;
            padding: 0;
        }
        
        .tools-list li {
            margin: 12px 0;
        }
        
        .tools-list a {
            display: block;
            padding: 16px 20px;
            background: white;
            border-radius: 8px;
            text-decoration: none;
            color: #222;
            font-size: 1.15rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        
        .tools-list a:hover {
            background: #0d6efd;
            color: white;
            transform: translateX(8px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.25);
        }
        
        footer {
            text-align: center;
            margin-top: 80px;
            color: #0d6efd;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <ul class="tools-list">
		<li><a href="uuid" target="_blank">UUID Generator</a></li>
		<li><a href="base64" target="_blank">Base64 Encoder / Decoder</a></li>
        <li><a href="sv" target="_blank">JWT viewer</a></li>
        <li><a href="#" target="_blank">SQL Formatter</a></li>
        <li><a href="#" target="_blank">Subtitles Generator (.srt)</a></li>
        <li><a href="#" target="_blank">JSON Formatter</a></li>
    </ul>

    <footer>
        Hosted on GitHub Pages
    </footer>
</body>
</html>
