<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Formatter (Aligned Insert)</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .container { display: flex; flex-direction: column; align-items: center; }

        textarea {
            /* 2x wider than original 600px, responsive */
            width: 1200px;
            max-width: 95vw;
            /* Expand vertically */
            height: 300px;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            /* Handle horizontal overflow */
            white-space: pre;
            overflow-x: auto;
            resize: vertical;
        }

        #outputSql {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .btn-back { cursor: pointer; color: #007bff; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="btn-back" onclick="goBack()">← Other tools</div>

<div class="container">
    <textarea id="inputSql" placeholder="Paste INSERT INTO statement here..." oninput="formatSQL()"></textarea>
    <textarea id="outputSql" placeholder="Formatted result..." readonly></textarea>
</div>

<script>
    function formatSQL() {
        const input = document.getElementById('inputSql').value;
        const output = document.getElementById('outputSql');

        if (!input.trim()) {
            output.value = '';
            return;
        }

        // Check if it's an INSERT INTO statement to use special logic
        if (/insert\s+into/i.test(input)) {
            output.value = alignInsertInto(input);
        } else {
            output.value = formatGenericSQL(input);
        }
    }

    function alignInsertInto(sql) {
        try {
            // 1. Extract parts
            const insertPart = sql.match(/insert\s+into\s+([\w.]+)\s*\((.*?)\)\s*values\s*(.*);?/is);
            if (!insertPart) return sql;

            const tableName = insertPart[1];
            const columns = insertPart[2].split(',').map(s => s.trim());

            // Extract value rows: (v1, v2), (v3, v4)
            const valuesRaw = insertPart[3].trim();
            const rowMatches = valuesRaw.match(/\((.*?)\)/gs);
            if (!rowMatches) return sql;

            const rows = rowMatches.map(row =>
                row.replace(/^\(|\)$/g, '').split(',').map(s => s.trim())
            );

            // 2. Calculate Max Widths for every column
            const maxWidths = columns.map((col, i) => {
                const cellLengths = rows.map(row => (row[i] || '').length);
                return Math.max(col.length, ...cellLengths);
            });

            // 3. Format Helper
            const padCell = (text, width) => text + ' '.repeat(Math.max(0, width - text.length));

            // 4. Reconstruct Header
            const formattedCols = columns.map((col, i) => padCell(col, maxWidths[i])).join(' , ');
            let result = `INSERT INTO ${tableName}\n(${formattedCols}) VALUES\n`;

            // 5. Reconstruct Rows
            const formattedRows = rows.map((row, rowIndex) => {
                const rowStr = row.map((cell, i) => padCell(cell, maxWidths[i])).join(' , ');
                const isLast = rowIndex === rows.length - 1;
                return `(${rowStr})${isLast ? ';' : ','}`;
            });

            return result + formattedRows.join('\n');
        } catch (e) {
            console.error(e);
            return sql; // Return original on error
        }
    }

    function formatGenericSQL(sql) {
        try {
            let formatted = sql
                // Normalize spaces
                .replace(/\s+/g, ' ')
                .trim();

            // Uppercase keywords
            const keywords = [
                "SELECT", "FROM", "WHERE", "GROUP BY", "ORDER BY", "HAVING", "LIMIT",
                "JOIN", "LEFT JOIN", "RIGHT JOIN", "INNER JOIN", "OUTER JOIN",
                "AND", "OR", "CASE", "WHEN", "THEN", "ELSE", "END"
            ];

            keywords.forEach(keyword => {
                const regex = new RegExp(`\\b${keyword}\\b`, 'gi');
                formatted = formatted.replace(regex, keyword);
            });

            // Line breaks for major clauses
            formatted = formatted
                .replace(/\bSELECT\b/g, '\nSELECT')
                .replace(/\bFROM\b/g, '\nFROM')
                .replace(/\bWHERE\b/g, '\nWHERE')
                .replace(/\bGROUP BY\b/g, '\nGROUP BY')
                .replace(/\bORDER BY\b/g, '\nORDER BY')
                .replace(/\bHAVING\b/g, '\nHAVING')
                .replace(/\bLIMIT\b/g, '\nLIMIT');

            // JOIN formatting
            formatted = formatted
                .replace(/\b(LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN|JOIN)\b/g, '\n$1');

            // WHERE conditions formatting
            formatted = formatted
                .replace(/\bAND\b/g, '\n    AND')
                .replace(/\bOR\b/g, '\n    OR');



            // GROUP BY / ORDER BY columns
            formatted = formatted.replace(/(GROUP BY|ORDER BY)\s+(.*?)(\n|$)/gis, (match, clause, cols, end) => {
                const splitCols = cols.split(',').map(c => c.trim());
                return `${clause}\n    ${splitCols.join(',\n    ')}${end}`;
            });

            // Clean extra newlines
            formatted = formatted
                .replace(/\n{2,}/g, '\n')
                .trim();

            return formatted;
        } catch (e) {
            console.error(e);
            return sql;
        }
    }

    function goBack() {
        alert("Navigating back...");
    }
</script>

</body>
</html>
