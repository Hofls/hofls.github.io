<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Formatter (Aligned Insert)</title>
    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@latest/dist/sql-formatter.min.js"></script>
    <link rel="stylesheet" href="../style.css"> </head>
    <style>
        .container { display: flex; flex-direction: column; align-items: center; }

        textarea {
            /* 2x wider than original 600px, responsive */
            width: 1200px;
            max-width: 95vw;
            /* Expand vertically */
            height: 300px;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            /* Handle horizontal overflow */
            white-space: pre;
            overflow-x: auto;
            resize: vertical;
        }

        #outputSql {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

    </style>
</head>
<body>

<nav class="back-nav">
    <div class="btn-back" onclick="goBack()">← Other tools</div>
</nav>

<div class="container centered-wrapper">
    <textarea id="inputSql" placeholder="Paste SQL here..." oninput="formatSQL()"></textarea>
    <textarea id="outputSql" placeholder="Formatted result..." readonly></textarea>
    <button onclick="copySQL()" id="copyBtn">Copy</button>
</div>

<script>
    function formatSQL() {
        const input = document.getElementById('inputSql').value;
        const output = document.getElementById('outputSql');

        if (!input.trim()) {
            output.value = '';
            return;
        }

        // Check if it's an INSERT INTO statement to use special logic
        if (/insert\s+into/i.test(input)) {
            output.value = formatInsertInto(input);
        } else {
            output.value = formatGenericSQL(input);
        }
    }

    function formatInsertInto(sql) {
        try {
            // 1. Extract parts
            const insertPart = sql.match(/insert\s+into\s+([\w.]+)\s*\((.*?)\)\s*values\s*(.*);?/is);
            if (!insertPart) return sql;

            const tableName = insertPart[1];
            const columns = insertPart[2].split(',').map(s => s.trim());

            // Extract value rows: (v1, v2), (v3, v4)
            const valuesRaw = insertPart[3].trim();
            const rowMatches = valuesRaw.match(/\((.*?)\)/gs);
            if (!rowMatches) return sql;

            const rows = rowMatches.map(row =>
                row.replace(/^\(|\)$/g, '').split(',').map(s => s.trim())
            );

            // 2. Calculate Max Widths for every column
            const maxWidths = columns.map((col, i) => {
                const cellLengths = rows.map(row => (row[i] || '').length);
                return Math.max(col.length, ...cellLengths);
            });

            // 3. Format Helper
            const padCell = (text, width) => text + ' '.repeat(Math.max(0, width - text.length));

            // 4. Reconstruct Header
            const formattedCols = columns.map((col, i) => padCell(col, maxWidths[i])).join(' , ');
            let result = `INSERT INTO ${tableName}\n(${formattedCols}) VALUES\n`;

            // 5. Reconstruct Rows
            const formattedRows = rows.map((row, rowIndex) => {
                const rowStr = row.map((cell, i) => padCell(cell, maxWidths[i])).join(' , ');
                const isLast = rowIndex === rows.length - 1;
                return `(${rowStr})${isLast ? ';' : ','}`;
            });

            return result + formattedRows.join('\n');
        } catch (e) {
            console.error(e);
            return sql; // Return original on error
        }
    }

    function formatGenericSQL(input) {
        return sqlFormatter.format(input, {
                    language: 'sql',
                    indent: '    ',
                    uppercase: true
        });
    }

    function goBack() {
        window.location.href = "../";
    }

    function copySQL() {
        const text = document.getElementById('outputSql').value;
        if (!text) return;

        const copyBtn = document.getElementById('copyBtn');
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = 'Copy';
            }, 800);
        });
    }
</script>

</body>
</html>
