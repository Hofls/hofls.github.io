<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css"> </head>
    <style>
        .display-box {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            word-break: break-all;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
   <nav class="back-nav">
       <div class="btn-back" onclick="goBack()">← Other tools</div>
   </nav>

   <div class="container centered-wrapper">
       <div id="uuid" class="display-box">Generating...</div>
       <div class="controls">
           <button onclick="generateUUID()">Generate UUID</button>
           <button id="copyBtn" onclick="copyUUID()">Copy</button>
       </div>
   </div>

   <script>
       const uuidDisplay = document.getElementById('uuid');
       const copyBtn = document.getElementById('copyBtn');
       let currentUUID = '';

       function generateUUID() {
           currentUUID = crypto.randomUUID();
           uuidDisplay.textContent = currentUUID;
       }

       function copyUUID() {
           if (!currentUUID) return;

           navigator.clipboard.writeText(currentUUID).then(() => {
               copyBtn.textContent = 'Copied!';
               setTimeout(() => {
                   copyBtn.textContent = 'Copy';
               }, 800);
           });
       }

       function goBack() {
           if (document.referrer) {
               window.history.back();
           } else {
               window.location.href = '..';
           }
       }

       window.onload = generateUUID;
   </script>

</body>
</html>
