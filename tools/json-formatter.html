<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Formatter</title>
    <link rel="stylesheet" href="../style.css">

    <!-- JSONEditor CSS -->
    <link href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.css" rel="stylesheet">
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 80px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
        }

        .display-box {
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
            min-height: 200px;
            background: #fff;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            width: 100%;
            overflow: hidden; /* IMPORTANT */
        }

        .actions {
            margin-top: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .jsoneditor {
            border: none;
            font-family: inherit;
            font-size: 13px;
        }

        .jsoneditor-menu {
            display: none;
        }
    </style>
</head>
<body>

<nav class="back-nav">
    <div class="btn-back" onclick="goBack()">← Other tools</div>
</nav>

<div class="container padded-centered-wrapper" style="max-width: 1050px; margin: auto;">

    <textarea id="jsonInput" placeholder="Paste JSON here..." oninput="formatJSONInput()"></textarea>

    <div id="outputBox" class="display-box"></div>

    <div class="actions">
        <button onclick="copyOutput()" id="copyBtn">Copy</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.js"></script>

<script>
    let editor;

    window.onload = function () {
        const container = document.getElementById('outputBox');

        editor = new JSONEditor(container, {
            mode: 'code',
            mainMenuBar: false,
            statusBar: false
        });

        setEditorHeight(200);
    };

    function setEditorHeight(minHeight = 200) {
        const container = document.getElementById('outputBox');
        const text = editor.getText();

        // Count the number of lines (at least 1)
        const lineCount = text ? text.split('\n').length : 1;

        // Manual calculation: 1 line = 10px
        // Adding a small buffer (e.g., 40px) for padding/internal UI elements
        const calculatedHeight = (lineCount * 20) + 40;

        container.style.height = Math.max(calculatedHeight, minHeight) + 'px';

        // Force the ACE editor (inside JSONEditor) to resize to the new container height
        if (editor && editor.aceEditor) {
            editor.aceEditor.resize();
        }
    }

    function formatJSONInput() {
        const input = document.getElementById('jsonInput').value.trim();

        if (!input) {
            editor.setText('');
            setEditorHeight(200);
            return;
        }

        try {
            const parsed = JSON.parse(input);
            const formatted = JSON.stringify(parsed, null, 2);
            editor.setText(formatted);
        } catch (e) {
            editor.setText('Invalid JSON');
        }

        setEditorHeight();
    }

    function copyOutput() {
        const text = editor.getText();
        if (!text) return;

        const copyBtn = document.getElementById('copyBtn');
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = 'Copy';
            }, 800);
        });
    }

    function clearAll() {
        document.getElementById('jsonInput').value = '';
        editor.setText('');
        setEditorHeight(200);
    }

    function goBack() {
        window.location.href = "../";
    }
</script>

</body>
</html>
