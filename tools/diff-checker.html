<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diff Checker</title>

    <!-- Diff lib -->
    <script src="dependencies/diff-match-patch.js"></script>

    <link rel="stylesheet" href="../style.css">

    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .areas {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 98%;
        }

        .row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        textarea {
            width: 99%;
            height: 80px; /* smaller */
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .diff-box {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre;
            overflow: auto;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-wrap: initial;
        }

        .added {
            background-color: #d4f8d4;
        }

        .removed {
            background-color: #ffd6d6;
        }

        .label {
            margin-bottom: 4px;
            font-size: 12px;
            color: #666;
        }

        .column {
            display: flex;
            flex-direction: column;
            padding-top: 10px;
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #f1f3f5;
            cursor: pointer;
        }

        button:hover {
            background: #e9ecef;
        }

        .controls {
            position: sticky;
            top: 20px; /* adjust to navbar height */
            z-index: 1000;
        }

        .current {
            outline: 1px solid #333;
        }
    </style>
</head>

<body>

<nav class="back-nav">
    <div class="btn-back" onclick="goBack()">← Other tools</div>
</nav>

<div class="container ">

    <div class="controls">
        <button onclick="prevDiff()">↑ Prev</button>
        <button onclick="nextDiff()">↓ Next</button>
        <span id="counter"></span>
    </div>

    <div class="areas">

        <!-- INPUTS -->
        <div class="row">
            <div class="column">
                <textarea id="before" oninput="runDiff()" placeholder="Paste original text here..."></textarea>
            </div>

            <div class="column">
                <textarea id="after" oninput="runDiff()" placeholder="Paste changed text here..."></textarea>
            </div>
        </div>

        <!-- OUTPUT -->
        <div class="row">
            <div id="beforeDiff" class="diff-box"></div>
            <div id="afterDiff" class="diff-box"></div>
        </div>

    </div>
</div>

<script>
    const dmp = new diff_match_patch();

    let diffElements = [];
    let currentIndex = -1;

    function runDiff() {
        const before = document.getElementById('before').value;
        const after = document.getElementById('after').value;

        const beforeBox = document.getElementById('beforeDiff');
        const afterBox = document.getElementById('afterDiff');

        if (!before && !after) {
            beforeBox.innerHTML = '';
            afterBox.innerHTML = '';
            return;
        }

        const diffs = dmp.diff_main(before, after);
        dmp.diff_cleanupSemantic(diffs);

        let beforeHtml = '';
        let afterHtml = '';

        diffs.forEach(([type, text]) => {
            const safeText = escapeHtml(text);
            if (!safeText) return;

            if (type === 0) {
                beforeHtml += safeText;
                afterHtml += safeText;
            } else if (type === -1) {
                beforeHtml += `<span class="removed diff-item">${safeText}</span>`;
            } else if (type === 1) {
                afterHtml += `<span class="added diff-item">${safeText}</span>`;
            }
        });

        beforeBox.innerHTML = beforeHtml;
        afterBox.innerHTML = afterHtml;

        collectDiffs();
    }

    function collectDiffs() {
        diffElements = [
            ...document.querySelectorAll('.removed'),
            ...document.querySelectorAll('.added')
        ];

        currentIndex = -1;
        updateCounter();
    }

    function nextDiff() {
        if (!diffElements.length) return;

        currentIndex = (currentIndex + 1) % diffElements.length;
        scrollToCurrent();
    }

    function prevDiff() {
        if (!diffElements.length) return;

        currentIndex = (currentIndex - 1 + diffElements.length) % diffElements.length;
        scrollToCurrent();
    }

    function scrollToCurrent() {
        diffElements.forEach(el => el.classList.remove('current'));

        const el = diffElements[currentIndex];
        el.classList.add('current');

        el.scrollIntoView({
            behavior: 'smooth',
            block: 'center'
        });

        updateCounter();
    }

    function updateCounter() {
        const counter = document.getElementById('counter');
        if (!diffElements.length) {
            counter.textContent = '0 / 0';
        } else {
            counter.textContent = `${currentIndex + 1} / ${diffElements.length}`;
        }
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function goBack() {
        window.location.href = "../";
    }
</script>

</body>
</html>
